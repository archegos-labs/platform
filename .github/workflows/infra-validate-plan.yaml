name: Infra - Validate & Plan

on:
  workflow_dispatch: # enables manual execution
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - '.tool-versions'
      - '.gitignore'
      - 'Makefile'
      - '**/docs/**'

concurrency: # set other jobs with the same 'group' in a queue
  group: platform-infra
  cancel-in-progress: false

permissions:
  id-token: write # allow creation of openid connect token
  contents: read  # allow read repository's content by steps

env:
  tf_version: '1.9.8'
  tg_version: '0.86.2'
  working_dir: '.'

jobs:
  validate:
    name: Infra - Validate & Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10 # avoid using gitHub runners time
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: true
      matrix:
        infra_env: [dev]
        region: [us-east-1]

    environment: ${{ matrix.infra_env }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          aws-region: ${{ matrix.region }}
          role-session-name: github-actions-oidc-session
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      # Install HashiCorp Terraform on PATH (the terragrunt-action only installs OpenTofu
      # via tofu_version). Terragrunt runs this binary via tf_path: terraform below.
      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.tf_version }}
          terraform_wrapper: false

      - name: Lint
        id: lint
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: 'hcl fmt --check --diff'

      - name: Init
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: |
            init --all --non-interactive
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          DEPLOYMENT: ${{ matrix.infra_env }}-${{ matrix.region }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}

      - name: Validate
        id: validate
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: |
            validate --all --non-interactive
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          DEPLOYMENT: ${{ matrix.infra_env }}-${{ matrix.region }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}

      - name: Plan
        id: plan
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: | 
            plan --all --non-interactive
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          DEPLOYMENT: ${{ matrix.infra_env }}-${{ matrix.region }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
