name: Infra - Validate & Plan

on:
  workflow_dispatch: # enables manual execution
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - '.tool-versions'
      - '.gitignore'
      - 'Makefile'
      - '**/docs/**'

concurrency: # set other jobs with the same 'group' in a queue
  group: platform-infra
  cancel-in-progress: false

permissions:
  id-token: write # allow creation of openid connect token
  contents: read  # allow read repository's content by steps

env:
  tf_version: '1.9.8'
  tg_version: '0.86.2'
  working_dir: '.'

jobs:
  validate:
    name: Infra - Validate & Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10 # avoid using GitHub runners time
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: true
      matrix:
        infra_env: [dev]
        region: [us-east-1]

    environment: ${{ matrix.infra_env }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-region: ${{ matrix.region }}
          role-session-name: github-actions-oidc-session
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      # Install HashiCorp Terraform on PATH (the terragrunt-action only installs OpenTofu
      # via tofu_version). Terragrunt runs this binary via tf_path: terraform below.
      - name: Install Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.tf_version }}
          terraform_wrapper: false

      - name: Lint
        id: lint
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: 'hcl fmt --check --diff'

      - name: Init
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: |
            init --all --non-interactive --provider-cache
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          DEPLOYMENT: ${{ matrix.infra_env }}-${{ matrix.region }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}

      - name: Validate
        id: validate
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: |
            validate --all --non-interactive --provider-cache
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          DEPLOYMENT: ${{ matrix.infra_env }}-${{ matrix.region }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}

      - name: Plan
        id: plan
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: |
            plan --all --non-interactive --provider-cache
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          DEPLOYMENT: ${{ matrix.infra_env }}-${{ matrix.region }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}

  security-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10 # avoid using GitHub runners time
    permissions:
      contents: read         # allow read repository's content by steps
      security-events: write # upload SARIF to the code-scanning dashboard
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Successor to tfsec (deprecated): Trivy runs the same Terraform/IaC
      # misconfiguration checks. exit-code 0 = report-only; raise to 1 to gate PRs.
      - name: Trivy IaC misconfiguration scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          # Documented, path-scoped exceptions for accepted/false-positive findings.
          trivyignores: .trivyignore.yaml
          format: sarif
          output: trivy-results.sarif
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
