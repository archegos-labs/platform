name: Infra - Destroy
run-name: ${{ github.actor}} is DESTROYING DEV! 🔥

on:
  workflow_dispatch: # enables manual execution
    inputs:
      infra_env:
        description: 'Environment to destroy'
        required: true
        default: 'dev'
        type: choice
        options:
            - 'dev'
      region:
        description: 'Region to destroy'
        required: true
        default: 'us-east-1'
        type: choice
        options:
            - 'us-east-1'

concurrency: # set other jobs with the same 'group' in a queue
  group: platform-infra
  cancel-in-progress: false

permissions:
  id-token: write      # allow creation of openid connect token
  contents: read       # allow read repository's content by steps
  pull-requests: write # allow adding comments in a pull request

env:
  tf_version: '1.9.8'
  tg_version: '0.86.2'
  working_dir: '.'

jobs:
  destroy:
    name: Infra - Destroy
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Avoid using GitHub Runners time
    defaults:
      run:
        shell: bash

    environment: ${{ inputs.infra_env }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          aws-region: ${{ inputs.region }}
          role-session-name: github-actions-oidc-session
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      # Install HashiCorp Terraform on PATH (the terragrunt-action only installs OpenTofu
      # via tofu_version). Terragrunt runs this binary via tf_path: terraform below.
      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.tf_version }}
          terraform_wrapper: false

      - name: Destory
        id: destroy
        uses: gruntwork-io/terragrunt-action@4ed5b7344c80315e5357f28f36159fc980bc2d5a # v3.4.0
        with:
          tf_path: terraform
          tg_version: ${{ env.tg_version }}
          tg_dir: ${{ env.working_dir }}
          tg_command: |
            destroy --all --non-interactive
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          DEPLOYMENT:  ${{ inputs.infra_env }}-${{ inputs.region }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
          TF_VAR_kube_data_auth_enabled: true
