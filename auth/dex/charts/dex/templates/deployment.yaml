apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        # Roll the pod whenever configmap (client list) or secret (client_id/secret env vars)
        # change. Without this, helm updates them but the running pod keeps stale env in memory.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
      - name: dex
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        command: ["dex", "serve", "/etc/dex/cfg/config.yaml"]
        env:
        - name: KUBERNETES_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        envFrom:
        - secretRef:
            name: {{ .Release.Name }}-oidc-client
        ports:
        - containerPort: 5556
          name: http
        volumeMounts:
        - mountPath: /etc/dex/cfg
          name: config
      volumes:
      - name: config
        configMap:
          name: {{ .Release.Name }}
          items:
          - key: config.yaml
            path: config.yaml