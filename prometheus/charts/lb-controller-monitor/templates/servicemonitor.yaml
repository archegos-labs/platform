apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aws-load-balancer-controller
  namespace: {{ .Release.Namespace }}
  labels:
    # kube-prometheus-stack's Prometheus selects ServiceMonitors labeled release=<release name>.
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      app.kubernetes.io/name: aws-load-balancer-controller
  endpoints:
    - port: metrics-server
      path: /metrics
      scheme: http