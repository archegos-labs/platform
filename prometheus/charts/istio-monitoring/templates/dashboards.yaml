# Wrap each vendored Istio dashboard JSON (dashboards/*.json) in a ConfigMap labeled
# grafana_dashboard=1, which the kube-prometheus-stack Grafana sidecar auto-imports from Grafana's
# own namespace (= this release namespace). JSON sourced from istio/istio@release-1.30
# manifests/addons/dashboards; keep in lockstep with istio_repo_version. Note: mesh/pilot/ztunnel
# are the upstream *.gen.json files (jsonnet-generated), re-vendored here under their plain names.
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-dashboard-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  {{ $name }}.json: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
