apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: oauth2-proxy
  namespace: {{ .Values.namespace }}
spec:
  gateways:
  - {{ .Values.ingress.namespace }}/{{ .Values.ingress.gateway }}
  hosts:
  - {{ .Values.dashboard_host }}
  http:
  - route:
    - destination:
        host: oauth2-proxy.{{ .Values.namespace }}.svc.cluster.local
        port:
          number: 4180