namespace: kubeflow

image:
  repository: quay.io/oauth2-proxy/oauth2-proxy
  tag: v7.15.3

ingress:
  namespace: ingress
  gateway: ingress-gateway
  service_account: istio-ingressgateway

dashboard_host: ""

# CIDRs trusted to set X-Forwarded-* headers (oauth2-proxy --trusted-proxy-ip). Empty = trust
# all (the backwards-compatible default, which logs a startup warning under reverse_proxy).
# Terraform sets this to the VPC CIDR (the ingress-gateway pod IP is the peer under ambient)
# plus loopback (the local proxy hop, in case a sidecar is ever injected) so X-Forwarded-* is
# honored from the gateway in either dataplane mode.
trusted_proxy_ips: []

oidc:
  issuer_url: ""
  client_id: kubeflow-oidc-authservice
  client_secret: ""

cookie_secret: ""

# Upstream services oauth2-proxy proxies to (path → service).
# Order matters: more specific paths must come first.
# dex_service is used for server-to-server redeem_url and oidc_jwks_url calls;
# it is overridden by the kubeflow terraform module from the auth/dex output.
upstreams:
  dex_service: dex-new.auth.svc.cluster.local:5556
  kfam_service: profiles-kfam.kubeflow.svc.cluster.local:8081
  pipeline_service: ml-pipeline-ui.kubeflow.svc.cluster.local:80
  metadata_envoy_service: metadata-envoy-service.kubeflow.svc.cluster.local:9090
  # Internal ClusterIP fronting the shared istio-ingressgateway's dedicated notebooks listener
  # (kubeflow/kubeflow-gateway). Fronts BOTH /jupyter/ (the JWA, where the gateway rewrites
  # /jupyter/ -> / since the JWA serves at root) and /notebook/<ns>/<name>/ (per-notebook
  # fan-out through the profile waypoint). Not exposed on the public NLB.
  notebook_gateway: istio-ingressgateway-notebooks.ingress.svc.cluster.local:8090
  # Internal ClusterIP fronting the Hub's dedicated listener (kubeflow/kubeflow-hub-gateway).
  # Fronts /model-registry/ (UI) and /api/model_catalog/ (catalog API), routed by VirtualServices
  # bound to kubeflow-hub-gateway. The registry REST API is per-profile and reached in-cluster by
  # the UI BFF, so it is not exposed here. Not on the public NLB.
  hub_gateway: istio-ingressgateway-hub.ingress.svc.cluster.local:8091
  dashboard_service: dashboard.kubeflow.svc.cluster.local:80