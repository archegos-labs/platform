apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: katib-ui
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/oauth2-proxy
  selector:
    matchLabels:
      katib.kubeflow.org/component: ui
