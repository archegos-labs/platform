apiVersion: v1
kind: Service
metadata:
  name: model-registry-ui-service
  namespace: {{ .Values.namespace }}
  labels:
    app: model-registry-ui
    run: model-registry-ui
spec:
  selector:
    app: model-registry-ui
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
  type: ClusterIP
