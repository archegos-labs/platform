apiVersion: v1
kind: ServiceAccount
metadata:
  # Name must stay notebook-controller-service-account: the kubeflow-profiles
  # ns-owner-access-waypoint AuthorizationPolicy allows this exact principal to reach
  # notebook server pods (*/api/kernels) in profile namespaces.
  name: notebook-controller-service-account
  namespace: {{ .Values.namespace }}
  labels:
    app: notebook-controller
    kustomize.component: notebook-controller
