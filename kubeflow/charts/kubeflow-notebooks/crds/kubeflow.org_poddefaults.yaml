---
# PodDefault CRD. Not shipped in the kubeflow/notebooks source (it lives in the upstream
# admission-webhook component). The Jupyter Web App lists poddefaults.kubeflow.org to populate
# the "Configurations" section of the spawner, so the CRD must exist. The PodDefault admission
# webhook that actually injects these into notebook pods is deferred (follow-up); without it,
# PodDefaults are selectable but not enforced.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: poddefaults.kubeflow.org
spec:
  group: kubeflow.org
  names:
    kind: PodDefault
    listKind: PodDefaultList
    plural: poddefaults
    singular: poddefault
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - selector
            properties:
              desc:
                type: string
              selector:
                type: object
                x-kubernetes-preserve-unknown-fields: true
            x-kubernetes-preserve-unknown-fields: true
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true