namespace: kubeflow

image_tag: v2.0.0
kfam_image: ghcr.io/kubeflow/dashboard/access-management
controller_image: ghcr.io/kubeflow/dashboard/profile-controller

userid_header: kubeflow-userid
userid_prefix: ""

# Cluster super-admin user (profile-controller/KFAM ADMIN config — grants access to all
# profiles). Distinct from per-profile owners below; typically the same as the admin
# profile's owner.
admin_email: ""

# Profiles to provision. Each entry yields: a Profile CR, a pre-created namespace
# (ambient + use-waypoint labels + an `owner` annotation so the profile-controller
# adopts it instead of hardcoding istio-injection on create), a "waypoint" Gateway,
# and an ns-owner-access-waypoint AuthorizationPolicy enforcing owner isolation at the
# waypoint. Keep in sync with the pipelines chart's profile_namespaces — terraform
# drives both from one local.profiles list (platform-lyl).
#
# Defaults to empty (a profile with an empty owner renders an invalid Profile). Terraform
# supplies the real list via local.profiles. Each entry: { namespace, owner }. Example:
#   profiles:
#   - namespace: kubeflow-admin
#     owner: admin@example.com
profiles: []

ingress:
  namespace: ingress
  gateway: ingress-gateway
  service_account: istio-ingressgateway