# Ambient waypoint proxy for each profile namespace. Enforces the L7
# ns-owner-access-istio AuthorizationPolicy (owner isolation on the userid header)
# that ztunnel cannot, now that profile namespaces run in ambient mode. Named
# "waypoint" so the static istio.io/use-waypoint label (profiles-namespace-labels-data)
# binds each namespace to it. Requires the Gateway API CRDs + istio-waypoint GatewayClass.
{{- range $profile := .Values.profiles }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: waypoint
  namespace: {{ $profile.namespace }}
  labels:
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
  - name: mesh
    port: 15008
    protocol: HBONE
{{- end }}