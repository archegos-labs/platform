# Pre-install hook: create the admin profile namespace on a FRESH install only, so the
# waypoint Gateway (a normal release resource, applied after pre-install hooks) has a
# namespace to land in. As a hook — NOT a tracked release resource — Helm never tries to
# "adopt" an already-existing, profile-controller-created namespace on `helm upgrade`
# (which fails with "cannot be imported into the current release: missing managed-by").
# It runs once, before release resources, on install; on upgrade it is a no-op and the
# existing controller-owned namespace is left untouched. Hook resources are not deleted
# on `helm uninstall`, so user data/notebooks are preserved.
# CAVEAT: a full reinstall (uninstall + install) re-runs this hook; Helm's default
# before-hook-creation delete policy would delete+recreate the namespace. Do NOT reinstall
# the kubeflow-profiles release on a cluster with live user data.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.admin_profile_namespace }}
  annotations:
    helm.sh/hook: pre-install
    # MUST match the Profile owner: the profile-controller only adopts a pre-existing
    # namespace whose owner annotation equals profile.Spec.Owner.Name; otherwise it
    # rejects the Profile ("not owned by profile creator") and never provisions the
    # default-editor SA / ns-owner-access-istio / RBAC.
    owner: {{ .Values.admin_email | quote }}
  labels:
    app.kubernetes.io/part-of: kubeflow-profile
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint