apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.admin_profile_namespace }}
  annotations:
    # Created here only so the waypoint Gateway (waypoint.yaml) has a namespace to
    # land in on a fresh install — the Profile controller creates profile namespaces
    # asynchronously from the admin Profile CR, which is too late for the Gateway in
    # the same Helm release. Keep on uninstall so user data/notebooks aren't deleted.
    # The profile-controller adopts this namespace (adds its Profile ownerRef + the
    # full namespace-labels set) when it reconciles the admin Profile.
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/part-of: kubeflow-profile
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
