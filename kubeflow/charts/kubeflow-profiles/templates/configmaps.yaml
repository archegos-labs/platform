apiVersion: v1
kind: ConfigMap
metadata:
  name: profiles-config
  namespace: {{ .Values.namespace }}
data:
  ADMIN: {{ .Values.admin_email | quote }}
  USERID_HEADER: {{ .Values.userid_header | quote }}
  USERID_PREFIX: {{ .Values.userid_prefix | quote }}
  WORKLOAD_IDENTITY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: profiles-namespace-labels-data
  namespace: {{ .Values.namespace }}
data:
  # Profile namespaces run in SIDECAR mode: istio-injection=enabled is set
  # explicitly below so enrollment is deterministic (not reliant on profile-
  # controller defaults). ns-owner-access-istio relies on L7 rules
  # (X-Auth-Request-Email) that only a sidecar — or an ambient waypoint — can
  # enforce. Do NOT switch to istio.io/dataplane-mode=ambient until waypoints
  # are deployed (platform-xd4); ambient without a waypoint drops those L7 rules
  # and breaks per-namespace owner isolation.
  namespace-labels.yaml: |-
    app.kubernetes.io/part-of: "kubeflow-profile"
    istio-injection: "enabled"
    katib.kubeflow.org/metrics-collector-injection: "enabled"
    pipelines.kubeflow.org/enabled: "true"
    serving.kubeflow.org/inferenceservice: "enabled"