apiVersion: v1
kind: ConfigMap
metadata:
  name: profiles-config
  namespace: {{ .Values.namespace }}
data:
  ADMIN: {{ .Values.admin_email | quote }}
  USERID_HEADER: {{ .Values.userid_header | quote }}
  USERID_PREFIX: {{ .Values.userid_prefix | quote }}
  WORKLOAD_IDENTITY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: profiles-namespace-labels-data
  namespace: {{ .Values.namespace }}
data:
  # Profile namespaces run in AMBIENT mode (dataplane-mode=ambient) so that KFP
  # step/driver pods (which set sidecar.istio.io/inject=false) are still captured
  # by istio-cni and get a ztunnel identity — required for them to reach the
  # ml-pipeline backend in multi-user. ztunnel can't enforce the L7
  # ns-owner-access-istio owner-isolation rule (X-Auth-Request-Email), so the
  # namespace is bound to an ambient waypoint (istio.io/use-waypoint=waypoint;
  # the waypoint Gateway is created per profile namespace — see waypoint.yaml).
  # Do NOT re-add istio-injection here: sidecar injection conflicts with ambient.
  namespace-labels.yaml: |-
    app.kubernetes.io/part-of: "kubeflow-profile"
    istio.io/dataplane-mode: "ambient"
    istio.io/use-waypoint: "waypoint"
    katib.kubeflow.org/metrics-collector-injection: "enabled"
    pipelines.kubeflow.org/enabled: "true"
    serving.kubeflow.org/inferenceservice: "enabled"