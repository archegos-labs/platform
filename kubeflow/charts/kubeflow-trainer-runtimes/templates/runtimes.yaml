# Vendored verbatim from `helm template kubeflow-trainer oci://ghcr.io/kubeflow/charts/kubeflow-trainer
# --version 2.2.1 --set runtimes.defaultEnabled=true` (the ClusterTrainingRuntime objects only).
#
# helm.sh/resource-policy: keep is intentional. These CRs were originally owned by the
# `kubeflow-trainer` operator release. During the one-time migration that moves them here,
# `keep` stops the operator's runtimes-off upgrade from deleting them so this release can adopt
# them in place (empty diff, no webhook call). It also leaves them in the cluster if this release
# is ever uninstalled — desirable for shared training-runtime blueprints.
#
# Labels are kept exactly as the upstream render produced them (incl. the original
# app.kubernetes.io/instance and helm.sh/chart values) so adoption is a true no-op.
---
apiVersion: trainer.kubeflow.org/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  name: deepspeed-distributed
  annotations:
    helm.sh/resource-policy: keep
  labels:
    trainer.kubeflow.org/framework: deepspeed
    helm.sh/chart: kubeflow-trainer-2.2.1
    app.kubernetes.io/name: kubeflow-trainer
    app.kubernetes.io/instance: kubeflow-trainer
    app.kubernetes.io/version: "2.2.1"
    app.kubernetes.io/managed-by: Helm
spec:
  mlPolicy:
    numNodes: 1
    mpi:
      numProcPerNode: 1
      mpiImplementation: OpenMPI
      sshAuthMountPath: /home/mpiuser/.ssh
      runLauncherAsNode: true
  template:
    spec:
      network:
        publishNotReadyAddresses: true
      successPolicy:
        operator: All
        targetReplicatedJobs:
          - launcher
      replicatedJobs:
        - name: launcher
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
            spec:
              template:
                spec:
                  containers:
                    - name: node
                      image: ghcr.io/kubeflow/trainer/deepspeed-runtime:v2.2.1
                      securityContext:
                        runAsUser: 1000
        - name: node
          template:
            spec:
              template:
                spec:
                  containers:
                    - name: node
                      image: ghcr.io/kubeflow/trainer/deepspeed-runtime:v2.2.1
                      securityContext:
                        runAsUser: 1000
                      command:
                        - /usr/sbin/sshd
                      args:
                        - -De
                        - -f
                        - /home/mpiuser/.sshd_config
                      readinessProbe:
                        tcpSocket:
                          port: 2222
                        initialDelaySeconds: 5
---
