---
# Dedicated identity for the profile-controller so its new SeaweedFS IAM/S3 calls
# (provisioning per-namespace credentials) can be scoped by principal in the
# seaweedfs AuthorizationPolicy instead of allowing the namespace `default` SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: kubeflow-pipelines-profile-controller
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: kubeflow-pipelines-profile-controller
  namespace: {{ .Values.kubeflow.namespace }}
---
