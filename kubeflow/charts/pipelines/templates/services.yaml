apiVersion: v1
kind: Service
# SeaweedFS service - provides S3-compatible storage for Kubeflow Pipelines.
# Port 9000 is kept for backward compatibility with configs that expect the legacy
# MinIO port; it targets the SeaweedFS S3 port (8333).
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: seaweedfs
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  ports:
  - name: http-iam
    port: 8111
    protocol: TCP
    targetPort: 8111
  - name: http-s3
    port: 8333
    protocol: TCP
    targetPort: 8333
  - name: http-s3-compat
    port: 9000
    protocol: TCP
    targetPort: 8333
  - name: http-master
    port: 9333
    protocol: TCP
    targetPort: 9333
  - name: grpc-master
    port: 19333
    protocol: TCP
    targetPort: 19333
  - name: grpc-filer
    port: 18888
    protocol: TCP
    targetPort: 18888
  - name: http-filer
    port: 8888
    protocol: TCP
    targetPort: 8888
  selector:
    app: seaweedfs
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/port: '8888'
    prometheus.io/scheme: http
    prometheus.io/scrape: 'true'
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  ports:
  - name: http
    port: 8888
    protocol: TCP
    targetPort: 8888
  - name: grpc
    port: 8887
    protocol: TCP
    targetPort: 8887
  selector:
    app: ml-pipeline
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
---
