---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: metadata-grpc-service
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  action: ALLOW
  rules:
  # Allow-all (justified for now). Callers: metadata-envoy (fronts the external
  # gateway /ml_metadata route, runs sa=default), metadata-writer, ml-pipeline,
  # and pipeline step pods that log lineage. Under ambient most of these are
  # now captured and have identities, so this can eventually be scoped — but
  # the step-pod identity is still undecided (platform-02x) and the external
  # gateway path complicates it. Tighten once platform-02x lands and a live
  # run confirms the caller principals.
  - {}
  selector:
    matchLabels:
      component: metadata-grpc-server
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: minio-service
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
  # Allow-all (justified for now). minio holds artifact-store credentials, so
  # this is the highest-value policy to scope. The catch-all currently makes
  # the ml-pipeline / ml-pipeline-ui rules above redundant; it exists for the
  # artifact-writing pipeline step pods, whose ServiceAccount is exactly the
  # open decision in platform-02x (default-editor vs pipeline-runner vs
  # multi-user). Cannot be safely scoped until platform-02x is resolved and a
  # live run confirms the step-pod principal — wrong scoping breaks artifact
  # writes mid-run. Once known, replace this with the step-pod SA (plus
  # persistenceagent / visualizationserver / cache as needed).
  - {}
  selector:
    matchLabels:
      app: minio
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline-ui
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  action: ALLOW
  rules:
  # oauth2-proxy reverse-proxies /pipeline/ to ml-pipeline-ui (see its configmap
  # upstreams), so oauth2-proxy is the direct in-mesh caller, not the gateway.
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/oauth2-proxy
  selector:
    matchLabels:
      app: ml-pipeline-ui
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline-visualizationserver
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-persistenceagent
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-scheduledworkflow
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-viewer-crd-service-account
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
  selector:
    matchLabels:
      app: ml-pipeline-visualizationserver
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-persistenceagent
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-scheduledworkflow
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-viewer-crd-service-account
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
  - when:
    - key: request.headers[x-auth-request-email]
      notValues:
      - '*'
  selector:
    matchLabels:
      app: ml-pipeline
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: mysql
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-persistenceagent
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-scheduledworkflow
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-viewer-crd-service-account
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/metadata-grpc-server
  selector:
    matchLabels:
      app: mysql
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: service-cache-server
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  # Allow-all REQUIRED (permanent justification). cache-server backs the
  # cache-webhook-kubeflow MutatingWebhookConfiguration, which is called by
  # kube-apiserver — a control-plane component outside the mesh with no SPIFFE
  # identity. A source-principals allow-list would 403 the webhook. This rule
  # cannot be scoped to mesh principals; do not replace it with a principals
  # block.
  - {}
  selector:
    matchLabels:
      app: cache-server