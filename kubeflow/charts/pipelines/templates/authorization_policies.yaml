---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: metadata-grpc-service
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  action: ALLOW
  rules:
  # Scoped from the prior allow-all (platform-f2i). Callers:
  #  - pipeline step pods logging lineage -> default-editor in each profile namespace
  #    (ztunnel-confirmed live: src=ns/kubeflow-admin/sa/default-editor);
  #  - ml-pipeline (api-server), metadata-writer, kubeflow-pipelines-cache;
  #  - metadata-envoy fronts the external /ml_metadata gateway route, via its own
  #    dedicated metadata-envoy SA (not the namespace default — see PR #185 review).
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-metadata-writer
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/metadata-envoy
        {{- range .Values.profile_namespaces }}
        - cluster.local/ns/{{ . }}/sa/default-editor
        {{- end }}
  selector:
    matchLabels:
      component: metadata-grpc-server
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: minio-service
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  action: ALLOW
  rules:
  # Scoped from the prior allow-all (platform-f2i). minio holds artifact-store creds.
  # Callers: ml-pipeline + ml-pipeline-ui (serve/read artifacts); artifact-writing
  # pipeline step pods AND the per-profile artifact proxy (ml-pipeline-ui-artifact)
  # -> default-editor in each profile namespace (ztunnel-confirmed live:
  # src=ns/kubeflow-admin/sa/default-editor); persistenceagent / visualizationserver
  # / cache read artifacts as needed.
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-persistenceagent
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-visualizationserver
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
        {{- range .Values.profile_namespaces }}
        - cluster.local/ns/{{ . }}/sa/default-editor
        {{- end }}
  selector:
    matchLabels:
      app: minio
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline-ui
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  action: ALLOW
  rules:
  # oauth2-proxy reverse-proxies /pipeline/ to ml-pipeline-ui (see its configmap
  # upstreams), so oauth2-proxy is the direct in-mesh caller, not the gateway.
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/oauth2-proxy
  selector:
    matchLabels:
      app: ml-pipeline-ui
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline-visualizationserver
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-persistenceagent
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-scheduledworkflow
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-viewer-crd-service-account
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
  selector:
    matchLabels:
      app: ml-pipeline-visualizationserver
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-persistenceagent
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-scheduledworkflow
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-viewer-crd-service-account
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
        {{- /* Multi-user: KFP step/driver pods run as default-editor in each profile
               namespace (ambient-captured) and call back to ml-pipeline gRPC. ztunnel
               matches only exact principals, so enumerate each profile namespace. */}}
        {{- range .Values.profile_namespaces }}
        - cluster.local/ns/{{ . }}/sa/default-editor
        {{- end }}
  - when:
    - key: request.headers[x-forwarded-email]
      notValues:
      - '*'
  selector:
    matchLabels:
      app: ml-pipeline
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: mysql
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-ui
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-persistenceagent
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-scheduledworkflow
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline-viewer-crd-service-account
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/kubeflow-pipelines-cache
        - cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/metadata-grpc-server
  selector:
    matchLabels:
      app: mysql
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: service-cache-server
  namespace: {{ .Values.kubeflow.namespace }}
spec:
  rules:
  # Allow-all REQUIRED (permanent justification). cache-server backs the
  # cache-webhook-kubeflow MutatingWebhookConfiguration, which is called by
  # kube-apiserver — a control-plane component outside the mesh with no SPIFFE
  # identity. A source-principals allow-list would 403 the webhook. This rule
  # cannot be scoped to mesh principals; do not replace it with a principals
  # block.
  - {}
  selector:
    matchLabels:
      app: cache-server