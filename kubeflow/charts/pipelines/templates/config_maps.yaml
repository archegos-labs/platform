kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: pipeline-api-server-config
  namespace: {{ .Values.kubeflow.namespace }}
---
apiVersion: v1
data:
  warning: |
    1. Do not use kubectl to edit this configmap, because some values are used
    during kustomize build. Instead, change the configmap and apply the entire
    kustomize manifests again.
    2. After updating the configmap, some deployments may need to be restarted
    until the changes take effect. A quick way to restart all deployments in a
    namespace: `kubectl rollout restart deployment -n <your-namespace>`.
  appName: pipeline
  appVersion: 2.16.1
  dbHost: mysql  # relic to be removed after release
  dbPort: '3306' # relic to be removed after release
  dbType: mysql
  mysqlHost: mysql
  mysqlPort: "3306"
  mlmdDb: metadb
  cacheDb: cachedb
  pipelineDb: mlpipeline
  bucketName: mlpipeline
  # Drives KFP_DEFAULT_PIPELINE_ROOT on the profile-controller; when non-empty
  # the controller provisions a per-namespace kfp-launcher configmap so v2 runs
  # in profile namespaces (multi-user) resolve their pipeline root. Must match
  # the central kfp-launcher configmap's defaultPipelineRoot.
  defaultPipelineRoot: 'minio://mlpipeline/v2/artifacts'
  autoUpdatePipelineDefaultVersion: 'true'
  cronScheduleTimezone: UTC
  cacheImage: gcr.io/google-containers/busybox
  DEFAULT_CACHE_STALENESS: ''
  MAXIMUM_CACHE_STALENESS: ''
  cacheNodeRestrictions: 'false'
  ConMaxLifeTime: 120s
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: pipeline-install-config
  namespace: {{ .Values.kubeflow.namespace }}
---
apiVersion: v1
data:
  # References:
  # * https://github.com/argoproj/argo-workflows/blob/v3.7.3/config/config.go
  # * https://github.com/argoproj/argo-workflows/blob/v3.7.3/docs/workflow-controller-configmap.md
  # * https://github.com/argoproj/argo-workflows/blob/v3.7.3/docs/workflow-controller-configmap.yaml

  # Choice of an executor is deprecated in favor of emissary executor
  executor: |
    imagePullPolicy: IfNotPresent
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 0.01
        memory: 32Mi
      limits:
        cpu: 0.5
        memory: 512Mi

  artifactRepository: |
    archiveLogs: true
    s3:
      endpoint: "{{ include "kubeflow-pipelines.s3Endpoint" . }}"
      bucket: "mlpipeline"
      # keyFormat is a format pattern to define how artifacts will be organized in a bucket.
      # It can reference workflow metadata variables such as workflow.namespace, workflow.name,
      # pod.name. Can also use strftime formating of workflow.creationTimestamp so that workflow
      # artifacts can be organized by date. If omitted, will use "{{`{{workflow.name}}`}}/{{`{{pod.name}}`}}",
      # which has potential for have collisions, because names do not guarantee they are unique
      # over the lifetime of the cluster.
      # Refer to https://kubernetes.io/docs/concepts/overview/working-with-objects/names/.
      #
      # The following format looks like:
      # artifacts/my-workflow-abc123/2018/08/23/my-workflow-abc123-1234567890
      # Adding date into the path greatly reduces the chance of {{`{{pod.name}}`}} collision.
      keyFormat: "artifacts/{{`{{workflow.name}}`}}/{{`{{workflow.creationTimestamp.Y}}`}}/{{`{{workflow.creationTimestamp.m}}`}}/{{`{{workflow.creationTimestamp.d}}`}}/{{`{{pod.name}}`}}"
      # insecure will disable TLS. Primarily used for minio installs not configured with TLS
      insecure: true
      accessKeySecret:
        name: mlpipeline-minio-artifact
        key: accesskey
      secretKeySecret:
        name: mlpipeline-minio-artifact
        key: secretkey
kind: ConfigMap
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: workflow-controller-configmap
  namespace: {{ .Values.kubeflow.namespace }}
---
apiVersion: v1
data:
  defaultPipelineRoot: "minio://mlpipeline/v2/artifacts"
  # The minio:// scheme is the KFP provider name, not the backend: it resolves
  # through the providers block below, which now points at SeaweedFS's
  # S3-compatible endpoint (service port 9000 -> SeaweedFS :8333).
  providers: |
    minio:
      default:
        endpoint: {{ include "kubeflow-pipelines.s3Endpoint" . }}
        disableSSL: true
        region: minio
        forcePathStyle: true
        credentials:
          fromEnv: false
          secretRef:
            secretName: mlpipeline-minio-artifact
            accessKeyKey: accesskey
            secretKeyKey: secretkey
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: kfp-launcher
  namespace: {{ .Values.kubeflow.namespace }}
---
apiVersion: v1
data:
  envoy-config.yaml: |-
    admin:
      access_log:
        name: admin_access
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.access_loggers.file.v3.FileAccessLog
          path: /tmp/admin_access.log
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }

    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: 9090 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    codec_type: auto
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: local_service
                          domains: [ "*" ]
                          routes:
                            - match: { prefix: "/" }
                              route:
                                cluster: metadata-cluster
                                max_stream_duration:
                                  grpc_timeout_header_max: '0s'
                              typed_per_filter_config:
                                envoy.filter.http.cors:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                                  allow_origin_string_match:
                                    - safe_regex:
                                        regex: ".*"
                                  allow_methods: GET, PUT, DELETE, POST, OPTIONS
                                  allow_headers: keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout
                                  max_age: "1728000"
                                  expose_headers: custom-header-1,grpc-status,grpc-message
                    http_filters:
                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: metadata-cluster
          connect_timeout: 30.0s
          type: logical_dns
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: { }
          lb_policy: round_robin
          load_assignment:
            cluster_name: metadata-grpc
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: metadata-grpc-service
                          port_value: 8080
kind: ConfigMap
metadata:
  labels:
    application-crd-id: kubeflow-pipelines
  name: metadata-envoy-configmap
  namespace: {{ .Values.kubeflow.namespace }}
---
