---
apiVersion: v1
data:
  sync.py: |
    # Copyright 2020-2021 The Kubeflow Authors
    #
    # Licensed under the Apache License, Version 2.0 (the "License");
    # you may not use this file except in compliance with the License.
    # You may obtain a copy of the License at
    #
    #      http://www.apache.org/licenses/LICENSE-2.0
    #
    # Unless required by applicable law or agreed to in writing, software
    # distributed under the License is distributed on an "AS IS" BASIS,
    # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
    # See the License for the specific language governing permissions and
    # limitations under the License.

    from http.server import BaseHTTPRequestHandler, HTTPServer
    import json
    import os
    import base64

    # From awscli installed in the alpine/k8s image.
    import botocore.session

    S3_BUCKET_NAME = 'mlpipeline'

    session = botocore.session.get_session()


    def create_iam_client():
        # Talks to the SeaweedFS IAM API to manage per-namespace S3 users.
        # Region is irrelevant to SeaweedFS (it only seeds SigV4 signing), so we
        # honor AWS_REGION from the env rather than hardcoding a placeholder. Creds
        # come from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (the SeaweedFS admin
        # credential) in the env.
        # Fail fast if AWS_ENDPOINT_URL is unset: without it botocore would target
        # the real AWS IAM endpoint, and with cluster AWS creds available (node
        # instance profile / IRSA) a misconfig could mint users/keys/policies in the
        # real account. The Deployment always sets it.
        region = os.environ.get("AWS_REGION", "us-east-1")
        endpoint_url = os.environ.get("AWS_ENDPOINT_URL")
        if not endpoint_url:
            raise RuntimeError(
                "AWS_ENDPOINT_URL must point to the in-cluster SeaweedFS IAM endpoint; "
                "refusing to fall back to the real AWS IAM API")
        return session.create_client('iam', region_name=region, endpoint_url=endpoint_url)


    iam = create_iam_client()


    def main():
        settings = get_settings_from_env()
        server = server_factory(**settings)
        server.serve_forever()


    def get_settings_from_env(controller_port=None,
                              visualization_server_image=None, frontend_image=None,
                              visualization_server_tag=None, frontend_tag=None, disable_istio_sidecar=None,
                              kfp_default_pipeline_root=None,
                              object_store_endpoint=None, kubeflow_namespace=None):
        """
        Returns a dict of settings from environment variables relevant to the controller

        Environment settings can be overridden by passing them here as arguments.

        Settings are pulled from the all-caps version of the setting name.  The
        following defaults are used if those environment variables are not set
        to enable backwards compatibility with previous versions of this script:
            visualization_server_image: ghcr.io/kubeflow/kfp-visualization-server
            visualization_server_tag: value of KFP_VERSION environment variable
            frontend_image: ghcr.io/kubeflow/kfp-frontend
            frontend_tag: value of KFP_VERSION environment variable
            disable_istio_sidecar: Required (no default)
        """
        settings = dict()
        settings["controller_port"] = \
            controller_port or \
            os.environ.get("CONTROLLER_PORT", "8080")

        settings["visualization_server_image"] = \
            visualization_server_image or \
            os.environ.get("VISUALIZATION_SERVER_IMAGE", "ghcr.io/kubeflow/kfp-visualization-server")

        settings["frontend_image"] = \
            frontend_image or \
            os.environ.get("FRONTEND_IMAGE", "ghcr.io/kubeflow/kfp-frontend")

        # Look for specific tags for each image first, falling back to
        # previously used KFP_VERSION environment variable for backwards
        # compatibility
        settings["visualization_server_tag"] = \
            visualization_server_tag or \
            os.environ.get("VISUALIZATION_SERVER_TAG") or \
            os.environ["KFP_VERSION"]

        settings["frontend_tag"] = \
            frontend_tag or \
            os.environ.get("FRONTEND_TAG") or \
            os.environ["KFP_VERSION"]

        settings["disable_istio_sidecar"] = \
            disable_istio_sidecar if disable_istio_sidecar is not None \
                else os.environ.get("DISABLE_ISTIO_SIDECAR") == "true"

        # KFP_DEFAULT_PIPELINE_ROOT is optional
        settings["kfp_default_pipeline_root"] = \
            kfp_default_pipeline_root or \
            os.environ.get("KFP_DEFAULT_PIPELINE_ROOT")

        # Object-store endpoint + central namespace are provided via env so the
        # per-namespace configmaps below aren't hardcoded at chart-render time.
        settings["object_store_endpoint"] = \
            object_store_endpoint or \
            os.environ.get("OBJECT_STORE_ENDPOINT", "seaweedfs:9000")

        settings["kubeflow_namespace"] = \
            kubeflow_namespace or \
            os.environ.get("KUBEFLOW_NAMESPACE", "kubeflow")

        return settings


    def server_factory(visualization_server_image,
                      visualization_server_tag, frontend_image, frontend_tag,
                      disable_istio_sidecar, kfp_default_pipeline_root=None,
                      object_store_endpoint="seaweedfs:9000",
                      kubeflow_namespace="kubeflow",
                      url="", controller_port=8080):
        """
        Returns an HTTPServer populated with Handler with customized settings
        """
        class Controller(BaseHTTPRequestHandler):
            def sync(self, parent, attachments):
                # parent is a namespace
                namespace = parent.get("metadata", {}).get("name")

                pipeline_enabled = parent.get("metadata", {}).get(
                    "labels", {}).get("pipelines.kubeflow.org/enabled")

                if pipeline_enabled != "true":
                    return {"status": {}, "attachments": []}

                # metadata-grpc-configmap and artifact-repositories are always created;
                # the kfp-launcher configmap is added when a default pipeline root is set.
                desired_resources = []
                if kfp_default_pipeline_root:
                    desired_resources += [{
                        "apiVersion": "v1",
                        "kind": "ConfigMap",
                        "metadata": {
                            "name": "kfp-launcher",
                            "namespace": namespace,
                        },
                        "data": {
                            # Isolate each profile's v2 artifacts under a per-namespace
                            # prefix; the per-namespace IAM policy (below) only grants
                            # access to private-artifacts/{namespace}/*.
                            # NOTE: KFP_DEFAULT_PIPELINE_ROOT only gates whether multi-user
                            # provisioning runs (see the `if` above); its value is
                            # intentionally NOT used verbatim here. The bucket is fixed to
                            # mlpipeline (created in seaweedfs postStart, scoped by every IAM
                            # policy), and the path must stay under private-artifacts/{ns}/ to
                            # match the grant — honoring an arbitrary root would break both.
                            "defaultPipelineRoot": f"minio://{S3_BUCKET_NAME}/private-artifacts/{namespace}/v2/artifacts",
                            # The minio:// scheme is the KFP provider name; it resolves
                            # through this providers block, which points at SeaweedFS's
                            # S3 endpoint with the per-namespace credentials provisioned
                            # by this controller.
                            "providers": (
                                "minio:\n"
                                "  default:\n"
                                "    endpoint: " + object_store_endpoint + "\n"
                                "    disableSSL: true\n"
                                "    region: minio\n"
                                "    forcePathStyle: true\n"
                                "    credentials:\n"
                                "      fromEnv: false\n"
                                "      secretRef:\n"
                                "        secretName: mlpipeline-minio-artifact\n"
                                "        accessKeyKey: accesskey\n"
                                "        secretKeyKey: secretkey\n"
                            ),
                        },
                    }]


                # Generate the desired child object(s).
                desired_resources += [
                    {
                        "apiVersion": "v1",
                        "kind": "ConfigMap",
                        "metadata": {
                            "name": "metadata-grpc-configmap",
                            "namespace": namespace,
                        },
                        "data": {
                            "METADATA_GRPC_SERVICE_HOST":
                                "metadata-grpc-service." + kubeflow_namespace,
                            "METADATA_GRPC_SERVICE_PORT": "8080",
                        },
                    },
                    # Per-namespace Argo artifact repository. The annotation makes Argo
                    # use this (default-namespaced) over the controller-level default,
                    # archiving each profile's workflow artifacts under a private prefix
                    # using that namespace's SeaweedFS credentials. The {{`{{...}}`}}
                    # sequences are helm-escaped so the literal Argo placeholders survive
                    # into the rendered sync.py.
                    {
                        "apiVersion": "v1",
                        "kind": "ConfigMap",
                        "metadata": {
                            "name": "artifact-repositories",
                            "namespace": namespace,
                            "annotations": {
                                "workflows.argoproj.io/default-artifact-repository": "default-namespaced"
                            }
                        },
                        "data": {
                            "default-namespaced": json.dumps({
                                "archiveLogs": True,
                                "s3": {
                                    "endpoint": object_store_endpoint,
                                    "bucket": S3_BUCKET_NAME,
                                    "keyFormat": "private-artifacts/" + namespace + "/{{`{{workflow.name}}`}}/{{`{{workflow.creationTimestamp.Y}}`}}/{{`{{workflow.creationTimestamp.m}}`}}/{{`{{workflow.creationTimestamp.d}}`}}/{{`{{pod.name}}`}}",
                                    "insecure": True,
                                    "accessKeySecret": {
                                        "name": "mlpipeline-minio-artifact",
                                        "key": "accesskey",
                                    },
                                    "secretKeySecret": {
                                        "name": "mlpipeline-minio-artifact",
                                        "key": "secretkey",
                                    }
                                }
                            })
                        }
                    },
                    # Visualization server related manifests below
                    {
                        "apiVersion": "apps/v1",
                        "kind": "Deployment",
                        "metadata": {
                            "labels": {
                                "app": "ml-pipeline-visualizationserver"
                            },
                            "name": "ml-pipeline-visualizationserver",
                            "namespace": namespace,
                        },
                        "spec": {
                            "selector": {
                                "matchLabels": {
                                    "app": "ml-pipeline-visualizationserver"
                                },
                            },
                            "template": {
                                "metadata": {
                                    "labels": {
                                        "app": "ml-pipeline-visualizationserver"
                                    },
                                    "annotations": disable_istio_sidecar and {
                                        "sidecar.istio.io/inject": "false"
                                    } or {},
                                },
                                "spec": {
                                    "containers": [{
                                        "image": f"{visualization_server_image}:{visualization_server_tag}",
                                        "imagePullPolicy":
                                            "IfNotPresent",
                                        "name":
                                            "ml-pipeline-visualizationserver",
                                        "ports": [{
                                            "containerPort": 8888
                                        }],
                                        "resources": {
                                            "requests": {
                                                "cpu": "50m",
                                                "memory": "200Mi"
                                            },
                                            "limits": {
                                                "cpu": "500m",
                                                "memory": "1Gi"
                                            },
                                        }
                                    }],
                                    "serviceAccountName":
                                        "default-editor",
                                },
                            },
                        },
                    },
                    {
                        "apiVersion": "networking.istio.io/v1alpha3",
                        "kind": "DestinationRule",
                        "metadata": {
                            "name": "ml-pipeline-visualizationserver",
                            "namespace": namespace,
                        },
                        "spec": {
                            "host": "ml-pipeline-visualizationserver",
                            "trafficPolicy": {
                                "tls": {
                                    "mode": "ISTIO_MUTUAL"
                                }
                            }
                        }
                    },
                    {
                        "apiVersion": "security.istio.io/v1beta1",
                        "kind": "AuthorizationPolicy",
                        "metadata": {
                            "name": "ml-pipeline-visualizationserver",
                            "namespace": namespace,
                        },
                        "spec": {
                            "selector": {
                                "matchLabels": {
                                    "app": "ml-pipeline-visualizationserver"
                                }
                            },
                            "rules": [{
                                "from": [{
                                    "source": {
                                        "principals": ["cluster.local/ns/{{ .Values.kubeflow.namespace }}/sa/ml-pipeline"]
                                    }
                                }]
                            }]
                        }
                    },
                    {
                        "apiVersion": "v1",
                        "kind": "Service",
                        "metadata": {
                            "name": "ml-pipeline-visualizationserver",
                            "namespace": namespace,
                        },
                        "spec": {
                            "ports": [{
                                "name": "http",
                                "port": 8888,
                                "protocol": "TCP",
                                "targetPort": 8888,
                            }],
                            "selector": {
                                "app": "ml-pipeline-visualizationserver",
                            },
                        },
                    },
                    # Artifact fetcher related resources below.
                    {
                        "apiVersion": "apps/v1",
                        "kind": "Deployment",
                        "metadata": {
                            "labels": {
                                "app": "ml-pipeline-ui-artifact"
                            },
                            "name": "ml-pipeline-ui-artifact",
                            "namespace": namespace,
                        },
                        "spec": {
                            "selector": {
                                "matchLabels": {
                                    "app": "ml-pipeline-ui-artifact"
                                }
                            },
                            "template": {
                                "metadata": {
                                    "labels": {
                                        "app": "ml-pipeline-ui-artifact"
                                    },
                                    "annotations": disable_istio_sidecar and {
                                        "sidecar.istio.io/inject": "false"
                                    } or {},
                                },
                                "spec": {
                                    "containers": [{
                                        "name":
                                            "ml-pipeline-ui-artifact",
                                        "image": f"{frontend_image}:{frontend_tag}",
                                        "imagePullPolicy":
                                            "IfNotPresent",
                                        "ports": [{
                                            "containerPort": 3000
                                        }],
                                        "env": [
                                            {
                                                "name": "MINIO_ACCESS_KEY",
                                                "valueFrom": {
                                                    "secretKeyRef": {
                                                        "key": "accesskey",
                                                        "name": "mlpipeline-minio-artifact"
                                                    }
                                                }
                                            },
                                            {
                                                "name": "MINIO_SECRET_KEY",
                                                "valueFrom": {
                                                    "secretKeyRef": {
                                                        "key": "secretkey",
                                                        "name": "mlpipeline-minio-artifact"
                                                    }
                                                }
                                            },
                                            {
                                                "name": "KUBEFLOW_USERID_HEADER",
                                                "value": "x-forwarded-email"
                                            },
                                            {
                                                "name": "KUBEFLOW_USERID_PREFIX",
                                                "value": ""
                                            },
                                            {
                                                "name": "FRONTEND_SERVER_NAMESPACE",
                                                "value": namespace
                                            }
                                        ],
                                        "resources": {
                                            "requests": {
                                                "cpu": "10m",
                                                "memory": "70Mi"
                                            },
                                            "limits": {
                                                "cpu": "100m",
                                                "memory": "500Mi"
                                            },
                                        }
                                    }],
                                    "serviceAccountName":
                                        "default-editor"
                                }
                            }
                        }
                    },
                    {
                        "apiVersion": "v1",
                        "kind": "Service",
                        "metadata": {
                            "name": "ml-pipeline-ui-artifact",
                            "namespace": namespace,
                            "labels": {
                                "app": "ml-pipeline-ui-artifact"
                            }
                        },
                        "spec": {
                            "ports": [{
                                "name":
                                    "http",  # name is required to let istio understand request protocol
                                "port": 80,
                                "protocol": "TCP",
                                "targetPort": 3000
                            }],
                            "selector": {
                                "app": "ml-pipeline-ui-artifact"
                            }
                        }
                    },
                ]
                print('Received request:\n', json.dumps(parent, sort_keys=True))
                print('Desired resources except secrets:\n', json.dumps(desired_resources, sort_keys=True))
                # Moved after the print argument because this is sensitive data.

                # Reuse the namespace's artifact secret if this controller already
                # created it; otherwise provision a new SeaweedFS access key plus a
                # policy that confines the namespace to its own artifact prefixes
                # (and the shared ones). Replaces the old static-credential copy.
                if s3_secret := attachments["Secret.v1"].get(f"{namespace}/mlpipeline-minio-artifact"):
                    desired_resources.append(s3_secret)
                    print('Using existing secret')
                else:
                    print('Provisioning SeaweedFS credentials.')
                    # The K8s Secret is the source of truth for the namespace's live
                    # key. If it's gone but the SeaweedFS identity still has keys (e.g.
                    # the secret was deleted or lost), prune them first — create_access_key
                    # appends rather than replaces, so without this old keys accumulate as
                    # orphaned-but-valid credentials that can never be revoked.
                    try:
                        existing = iam.list_access_keys(UserName=namespace)
                        for key_meta in existing.get("AccessKeyMetadata", []):
                            iam.delete_access_key(
                                UserName=namespace,
                                AccessKeyId=key_meta["AccessKeyId"])
                    except Exception as exc:
                        # The user may not exist yet on first provision; create_access_key
                        # creates it. Pruning is best-effort.
                        print(f'No existing access keys to prune for {namespace}: {exc}')
                    s3_access_key = iam.create_access_key(UserName=namespace)
                    iam.put_user_policy(
                        UserName=namespace,
                        PolicyName=f"KubeflowProject{namespace}",
                        PolicyDocument=json.dumps(
                            {
                                "Version": "2012-10-17",
                                "Statement": [{
                                    "Effect": "Allow",
                                    "Action": [
                                        "s3:Put*",
                                        "s3:Get*",
                                        "s3:List*"
                                    ],
                                    # SeaweedFS authorizes List against the request *prefix*
                                    # (s3api authRequest sets object=prefix for ACTION_LIST),
                                    # so these object-prefix ARNs already permit listing within
                                    # the namespace's prefixes. The bucket ARN (arn:aws:s3:::bucket)
                                    # is intentionally omitted: adding it would grant listing the
                                    # whole bucket (all namespaces), and SeaweedFS ignores the
                                    # s3:prefix Condition AWS would use to scope it.
                                    "Resource": [
                                        f"arn:aws:s3:::{S3_BUCKET_NAME}/artifacts/*",
                                        f"arn:aws:s3:::{S3_BUCKET_NAME}/private-artifacts/{namespace}/*",
                                        f"arn:aws:s3:::{S3_BUCKET_NAME}/private/{namespace}/*",
                                        f"arn:aws:s3:::{S3_BUCKET_NAME}/shared/*",
                                    ]
                                }]
                            })
                    )
                    desired_resources.append({
                        "apiVersion": "v1",
                        "kind": "Secret",
                        "metadata": {
                            "name": "mlpipeline-minio-artifact",
                            "namespace": namespace,
                        },
                        "data": {
                            "accesskey": base64.b64encode(s3_access_key["AccessKey"]["AccessKeyId"].encode('utf-8')).decode("utf-8"),
                            "secretkey": base64.b64encode(s3_access_key["AccessKey"]["SecretAccessKey"].encode('utf-8')).decode("utf-8"),
                        },
                    })

                # Readiness: every kind we declare must be observed back as an
                # attachment in the expected count. Derived from desired_resources so
                # adding/removing a child can't desync a hand-maintained counter.
                desired_counts = {}
                for resource in desired_resources:
                    key = f'{resource["kind"]}.{resource["apiVersion"]}'
                    desired_counts[key] = desired_counts.get(key, 0) + 1
                ready = all(
                    len(attachments.get(key, {})) == count
                    for key, count in desired_counts.items()
                )
                desired_status = {
                    "kubeflow-pipelines-ready": "True" if ready else "False"
                }

                return {"status": desired_status, "attachments": desired_resources}

            def do_POST(self):
                # Serve the sync() function as a JSON webhook.
                observed = json.loads(
                    self.rfile.read(int(self.headers.get("content-length"))))
                desired = self.sync(observed["object"], observed["attachments"])

                self.send_response(200)
                self.send_header("Content-type", "application/json")
                self.end_headers()
                self.wfile.write(bytes(json.dumps(desired), 'utf-8'))

        return HTTPServer((url, int(controller_port)), Controller)

    if __name__ == "__main__":
        main()

kind: ConfigMap
metadata:
  labels:
    app: kubeflow-pipelines-profile-controller
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: kubeflow-pipelines-profile-controller-code
  namespace: {{ .Values.kubeflow.namespace }}
---
apiVersion: v1
data:
  DISABLE_ISTIO_SIDECAR: 'false'
  ISTIO_GATEWAY: {{ .Values.ingress.namespace }}/{{ .Values.ingress.gateway }}
  KUBEFLOW_USERID_HEADER: 'x-forwarded-email'
  KUBEFLOW_USERID_PREFIX: ''
kind: ConfigMap
metadata:
  labels:
    app: kubeflow-pipelines-profile-controller
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: kubeflow-pipelines-profile-controller-env
  namespace: {{ .Values.kubeflow.namespace }}
---
apiVersion: v1
data:
  METADATA_GRPC_SERVICE_HOST: metadata-grpc-service
  METADATA_GRPC_SERVICE_PORT: '8080'
