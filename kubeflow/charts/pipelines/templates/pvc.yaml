kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: {{ .Values.kubeflow.namespace }}
  labels:
    application-crd-id: kubeflow-pipelines
spec:
  storageClassName: gp2
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi