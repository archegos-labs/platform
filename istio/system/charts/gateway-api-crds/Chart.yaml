apiVersion: v2
name: gateway-api-crds
description: >-
  Kubernetes Gateway API standard-channel CRDs (GatewayClass, Gateway, HTTPRoute,
  GRPCRoute, ReferenceGrant, TLSRoute, ListenerSet, BackendTLSPolicy). Required by Istio
  ambient waypoints; istiod creates the istio-waypoint GatewayClass once these exist.
  Istio 1.30 reads TLSRoute/ReferenceGrant from the standard channel, so v1.5.x is
  required. Vendored from kubernetes-sigs/gateway-api v1.5.1 standard-install.yaml under
  templates/ (NOT crds/) so `helm upgrade` reconciles them on every apply — same pattern
  as prometheus-operator-crds. Each object carries `helm.sh/resource-policy: keep` so the
  CRDs (and their custom resources) survive `helm uninstall`. To bump: replace
  templates/standard-install.yaml with the new release bundle, re-add the keep annotation,
  and update appVersion.
type: application
version: 1.0.0
appVersion: "1.5.1"
