apiVersion: v2
name: gateway-api-crds
description: >-
  Kubernetes Gateway API standard-channel CRDs (GatewayClass, Gateway, HTTPRoute,
  GRPCRoute, ReferenceGrant). Required by Istio ambient waypoints; istiod creates the
  istio-waypoint GatewayClass once these exist. Vendored verbatim from
  kubernetes-sigs/gateway-api v1.2.1 standard-install.yaml (in crds/, so Helm applies
  them on install). Bump by replacing crds/standard-install.yaml from the upstream release.
type: application
version: 1.0.0
appVersion: "1.2.1"
